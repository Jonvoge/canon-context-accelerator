# yaml-language-server: $schema=../../schemas/ontology.schema.json
schema_version: "1.0"
domain: retail
dimensions:
  - name: Order Status
    column: Sales.Status
    aliases:
      - status
      - order state
    enumerate: true
    value_descriptions:
      Completed: "Delivered and paid. Only status used in revenue calcs."
      Cancelled: "Unreliable before March 2024."

  - name: Product Category
    column: Products.Category
    aliases:
      - category
      - product type
      - product group
    enumerate: true
    hierarchy:
      - Category
      - SubCategory
    value_descriptions:
      Electronics: "Consumer electronics and components. Accessories split out June 2025."
      Accessories: "Valid from 2025-06-01."

  - name: Store Region
    column: Stores.Region
    aliases:
      - region
      - geography
    enumerate: true
    value_descriptions:
      North: "Jutland and North Zealand"
      South: "South Zealand, Funen, Lolland-Falster"
      Capital: "Greater Copenhagen area"

  - name: Customer ID
    column: Customers.CustomerID
    enumerate: false
