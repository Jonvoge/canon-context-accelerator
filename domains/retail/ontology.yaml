# yaml-language-server: $schema=../../schemas/ontology.schema.json
schema_version: "1.0"
domain: retail
dimensions:
  - name: Product Category
    column: dim_product.category
    aliases:
      - category
      - product type
      - product group
    enumerate: true
    hierarchy:
      - category
      - sub_category
    value_descriptions: {}

  - name: Store Region
    column: dim_geography.region
    aliases:
      - region
      - geography
    enumerate: true
    value_descriptions: {}

  - name: Customer Segment
    column: dim_customer.segment
    aliases:
      - segment
      - customer type
    enumerate: true
    value_descriptions: {}

  - name: Customer ID
    column: dim_customer.customer_id
    enumerate: false
