  - name: Gross Margin %
    domain: retail
    owner: Retail Analytics Team
    last_reviewed: "2026-06-08"
    status: active
    aliases:
      - gross margin
      - margin percent
      - margin %
      - GM%

    definition: >
      Gross Profit divided by Total Revenue, expressed as a percentage.
      Measures profitability after direct costs. A higher value means less of revenue
      is consumed by cost of goods.

    formatting:
      precision: 1
      display: "0.0%"
      conversational: "one decimal place, as percentage"

    governed_sources:
      primary:
        platform: fabric
        type: semantic_model
        workspace: 'Fabric Demos: Retail Planning'
        model: RetailSemanticModel
        measure: Gross Margin %

    routing: >
      Query primary (RetailSemanticModel). Do not compute manually from warehouse columns
      without matching the same revenue exclusions.

    usage_patterns:
      - pattern_id: gross-margin-scalar
        question: Gross margin percentage for a given period
        source: semantic_model
        dax: |
          EVALUATE
          ROW(
            "Gross Margin %", CALCULATE([Gross Margin %], dim_date[Date] >= DATE({START_YEAR},{START_MONTH},{START_DAY}) && dim_date[Date] <= DATE({END_YEAR},{END_MONTH},{END_DAY}))
          )
      - pattern_id: gross-margin-by-category
