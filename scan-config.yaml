# yaml-language-server: $schema=schemas/scan-config.schema.json
#
# scan-config.yaml — Canon connection and domain registry.
#
# THIS IS THE MAIN FILE YOU EDIT WHEN ONBOARDING A CLIENT.
#
# THREE THINGS TO CONFIGURE:
#
#   1. CONNECTORS — tell Canon where to find semantic models and warehouses.
#      One connector entry per source. The id is just a slug you reference below.
#
#      type must be one of:
#        fabric_semantic  — Power BI / Fabric semantic model (executeQueries API)
#        fabric_sql       — Fabric SQL endpoint, warehouse, or lakehouse
#        snowflake        — Snowflake (connector exists, not yet validated with live data)
#        databricks       — Databricks (connector exists, not yet validated with live data)
#
#      For fabric_semantic (Power BI / Fabric semantic model):
#        workspace_id  — GUID from the workspace URL in Power BI service.
#                        app.powerbi.com/groups/<workspace_id>/...
#        dataset_name  — Exact name of the semantic model (dataset) as it appears
#                        in the Power BI workspace. Case-sensitive.
#
#      For fabric_sql (Fabric SQL endpoint / warehouse / lakehouse):
#        server        — SQL connection string from the workspace → item →
#                        "Copy SQL connection string". Format:
#                        <guid>.database.fabric.microsoft.com,1433
#        database      — Exact database name from the same connection dialog.
#
#      auth_secret_name — The name of the GitHub Actions secret that holds the
#        service principal client secret. All connectors in the same tenant can
#        share one secret. The secret value is the SP client secret from Entra ID.
#        The SP needs: Power BI Admin API → Dataset.ReadWrite.All + Workspace.Read.All
#        Corresponding tenant/client ID are set via CANON_FABRIC_TENANT_ID and
#        CANON_FABRIC_CLIENT_ID Actions secrets.
#
#   2. DOMAINS — one entry per business domain you want Canon to govern.
#      owners        — GitHub @handles of the domain owners. They are @mentioned on
#                      every drift issue the scan opens (GitHub emails them natively).
#                      Also add them to CODEOWNERS for the domain folder.
#      models        — structured list of domain-serving models. Prefer this over legacy
#                      semantic_connector / warehouse_connector keys.
#      profile_dimensions — names of dimensions whose values the scan tracks for drift.
#      digest_target — @GitHub handle or team to cc on all drift issues for this domain.
#
#   3. SECRETS (set in GitHub repo → Settings → Secrets and variables → Actions)
#      Required secrets:
#        CANON_FABRIC_CLIENT_SECRET — SP client secret (shared across connectors)
#        CANON_FABRIC_TENANT_ID     — Azure AD tenant GUID
#        CANON_FABRIC_CLIENT_ID     — SP application (client) GUID
#      Optional secrets:
#        ANTHROPIC_API_KEY          — Enables LLM-enriched definitions during bootstrap
#
schema_version: "1.0"

scanner:
  distinct_value_cap: 500
  max_workers: 4
  stale_after_hours: 168
  fail_on_schema_error: true
  publish_cache_artifact: true

schedules:
  scan_cron: "0 6 * * 1"
  timezone: "Europe/Copenhagen"

connectors:
  - id: retail-semantic
    type: fabric_semantic
    auth_secret_name: CANON_FABRIC_CLIENT_SECRET
    options:
      workspace_id: "b53e615a-ab79-49f9-bcf0-67250a34f633"
      dataset_id: "6eed1bc2-c159-4428-9cf8-6bb1d4e2d6c5"
      dataset_name: "RetailSemanticModel"

  - id: retail-sql
    type: fabric_sql
    auth_secret_name: CANON_FABRIC_CLIENT_SECRET
    options:
      server: "eibo3j4ddcgerc53n3spaq62nu-ljqt5nlzvp4utphqm4squnhwgm.database.fabric.microsoft.com,1433"
      database: "RetailDemoDB-e152e30b-3c31-4b9e-93e2-307de0004d9e"

domains:
  - name: retail
    path: domains/retail
    owners:
      - "@finance-lead"
    models:
      - connector: retail-semantic
        role: semantic
        primary: true
        description: >
          Retail Planning semantic model — daily grain, completed orders only,
          governed measures. Use for KPI/aggregate questions.
      - connector: retail-sql
        role: warehouse
        description: >
          retail_lakehouse SQL endpoint — row-level detail, joins, exports.
          Use when the semantic model lacks the columns needed.
    semantic_connector: retail-semantic
    warehouse_connector: retail-sql
    profile_dimensions:
      - Order Status
      - Product Category
      - Store Region
    issue_labels:
      - "domain:retail"
      - "drift"
    digest_target: "@finance-lead"
