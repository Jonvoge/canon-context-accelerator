name: Canon Sync (Genie)
on:
  push:
    branches: [main]
    paths: ['domains/**']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    if: vars.CANON_SYNC_ENABLED == 'true'
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      - name: Sync to downstream surfaces
        env:
          CANON_SYNC_TARGET: ${{ vars.CANON_SYNC_TARGET }}
        run: |
          echo "Sync not yet implemented. Target: $CANON_SYNC_TARGET"
