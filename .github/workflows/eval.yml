name: Canon Eval
on:
  schedule:
    - cron: '0 7 * * 1'  # Monday 07:00 UTC
  pull_request:
    paths: ['domains/**']
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run eval harness
        env:
          CANON_EVAL_MODEL: ${{ vars.CANON_EVAL_MODEL || 'claude-sonnet-4-20250514' }}
          CANON_EVAL_API_KEY: ${{ secrets.CANON_EVAL_API_KEY }}
        run: |
          echo "Running eval harness..."
          uv run python evals/run_evals.py

      - name: Upload eval results
        uses: actions/upload-artifact@v4
        with:
          name: eval-results
          path: .canon-cache/**/eval-results.json
          retention-days: 30
