name: Canon Eval
# Run on demand only — this is a sales proof point, not a merge gate.
# ANTHROPIC_API_KEY must be set as an Actions secret for this to work.
on:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run eval harness
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          echo "Running eval harness..."
          uv run python evals/run_evals.py

      - name: Upload eval results
        uses: actions/upload-artifact@v4
        with:
          name: eval-results
          path: .canon-cache/**/eval-results.json
          retention-days: 30
