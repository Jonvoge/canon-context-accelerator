name: Test
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - run: uv python install 3.12
      - run: uv sync --frozen --all-extras
      - run: uv run python -m pytest tests/ -q
      - run: uv run ruff check .
