name: Canon Interview Intake
on:
  issue_comment:
    types: [created]
permissions:
  contents: write
  pull-requests: write
jobs:
  intake:
    if: |
      contains(join(github.event.issue.labels.*.name, ','), 'canon-interview') &&
      github.event.issue.pull_request &&
      contains(fromJson('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association)
    runs-on: ubuntu-latest
    steps:
      # Checkout the default branch (trusted code), not the PR head.
      # The event payload (GITHUB_EVENT_PATH) supplies the comment content;
      # no user-supplied code is executed.
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - run: uv python install 3.12
      - run: uv sync --frozen --all-extras
      - name: Draft metric from issue comment
        env:
          GITHUB_EVENT_PATH: ${{ github.event_path }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: uv run canon interview --from-issue --repo-root .
      - name: Commit drafted metric
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH=$(gh pr view ${{ github.event.issue.number }} --json headRefName -q '.headRefName')
          git config user.name "canon-bot"
          git config user.email "canon-bot@users.noreply.github.com"
          git add domains/*/metrics.yaml
          git diff --cached --quiet || git commit -m "canon(interview): draft metric from issue intake"
          git push origin HEAD:"$BRANCH"
