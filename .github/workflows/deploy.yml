name: Deploy Container Apps

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_MCP: ghcr.io/${{ github.repository_owner }}/canon-mcp
  IMAGE_PROXY: ghcr.io/${{ github.repository_owner }}/canon-fabric-proxy

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      mcp-tag: ${{ steps.meta-mcp.outputs.version }}
      proxy-tag: ${{ steps.meta-proxy.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata for canon-mcp
        id: meta-mcp
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_MCP }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push canon-mcp
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta-mcp.outputs.tags }}
          labels: ${{ steps.meta-mcp.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata for canon-fabric-proxy
        id: meta-proxy
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PROXY }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push canon-fabric-proxy
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.fabric-proxy
          push: true
          tags: ${{ steps.meta-proxy.outputs.tags }}
          labels: ${{ steps.meta-proxy.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy canon-mcp to Azure Container Apps
        uses: azure/container-apps-deploy-action@v2
        with:
          resourceGroup: ${{ vars.AZURE_RESOURCE_GROUP }}
          containerAppName: ${{ vars.AZURE_CONTAINER_APP_MCP }}
          imageToDeploy: ${{ env.IMAGE_MCP }}:${{ needs.build-and-push.outputs.mcp-tag }}
          registryUrl: ${{ env.REGISTRY }}
          registryUsername: ${{ github.actor }}
          registryPassword: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy canon-fabric-proxy to Azure Container Apps
        uses: azure/container-apps-deploy-action@v2
        with:
          resourceGroup: ${{ vars.AZURE_RESOURCE_GROUP }}
          containerAppName: ${{ vars.AZURE_CONTAINER_APP_PROXY }}
          imageToDeploy: ${{ env.IMAGE_PROXY }}:${{ needs.build-and-push.outputs.proxy-tag }}
          registryUrl: ${{ env.REGISTRY }}
          registryUsername: ${{ github.actor }}
          registryPassword: ${{ secrets.GITHUB_TOKEN }}
