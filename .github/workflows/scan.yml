name: Canon Scan
on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:
    inputs:
      domain:
        description: 'Domain to scan (leave empty for all)'
        required: false
        type: string

permissions:
  issues: write
  contents: write

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.domains.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - run: uv python install 3.12
      - run: uv sync --frozen
      - id: domains
        env:
          INPUT_DOMAIN: ${{ inputs.domain }}
        run: |
          if [ -n "$INPUT_DOMAIN" ]; then
            echo "matrix=$(jq -cn --arg d "$INPUT_DOMAIN" '{"domain":[$d]}')" >> "$GITHUB_OUTPUT"
          else
            DOMAINS=$(uv run canon list-domains --json)
            echo "matrix=$(echo "$DOMAINS" | jq -c '{"domain":.}')" >> "$GITHUB_OUTPUT"
          fi

  scan:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - name: Set up Python
        run: uv python install 3.12
      - name: Install dependencies
        run: uv sync --frozen
      - name: Run structural scan
        env:
          CANON_FABRIC_CLIENT_SECRET: ${{ secrets.CANON_FABRIC_CLIENT_SECRET }}
          CANON_FABRIC_TENANT_ID: ${{ secrets.CANON_FABRIC_TENANT_ID }}
          CANON_FABRIC_CLIENT_ID: ${{ secrets.CANON_FABRIC_CLIENT_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          uv run canon scan --domain "${{ matrix.domain }}" --config scan-config.yaml \
            --create-issues --github-repo "${{ github.repository }}" --github-token "$GITHUB_TOKEN"
      - name: Commit scan cache to repo
        run: |
          git config user.name "canon-bot"
          git config user.email "canon-bot@users.noreply.github.com"
          git add .canon-cache/
          git diff --cached --quiet || git commit -m "chore(cache): update scan cache [skip ci]"
          git push
      - name: Upload scan cache
        uses: actions/upload-artifact@v4
        with:
          name: scan-cache-${{ matrix.domain }}
          path: .canon-cache/
          retention-days: 30
