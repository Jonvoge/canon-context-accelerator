name: Build Index
on:
  push:
    branches: [main]
permissions:
  contents: write
jobs:
  build-index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - run: uv python install 3.12
      - run: uv sync --frozen
      - run: uv run canon build-index
      - run: |
          git config user.name "canon-bot"
          git config user.email "canon-bot@users.noreply.github.com"
          git add domains/_index.json
          git diff --cached --quiet || git commit -m "chore(index): rebuild domain index [skip ci]"
          git push
