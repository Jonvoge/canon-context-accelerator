name: Canon Setup
on:
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      - name: Ensure labels exist
        uses: actions/github-script@v8
        with:
          script: |
            const labels = [
              { name: 'canon', color: '0052CC', description: 'Canon context layer' },
              { name: 'drift', color: 'D93F0B', description: 'Drift finding from scan' },
              { name: 'undocumented-measure', color: 'FBCA04', description: 'Measure in platform but not in Canon' },
              { name: 'orphaned-definition', color: 'E4E669', description: 'Canon definition with no platform source' },
              { name: 'missing-source', color: 'F9D0C4', description: 'Authored source pointer not found' },
              { name: 'dimension-values', color: 'C5DEF5', description: 'Dimension value drift' },
              { name: 'needs-review', color: '006B75', description: 'Awaiting human review' },
            ];
            for (const label of labels) {
              try {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ...label,
                });
              } catch (e) {
                if (e.status !== 422) throw e;
              }
            }

      - name: Validate repo structure
        run: |
          echo "Checking required directories..."
          test -d domains/_template || (echo "FAIL: domains/_template missing" && exit 1)
          test -d schemas || (echo "FAIL: schemas/ missing" && exit 1)
          test -f scan-config.yaml || (echo "FAIL: scan-config.yaml missing" && exit 1)
          test -f CODEOWNERS || (echo "FAIL: CODEOWNERS missing" && exit 1)
          echo "All checks passed."

      - name: Open setup checklist issue
        uses: actions/github-script@v8
        with:
          script: |
            const title = 'Canon Setup Checklist';
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'canon',
            });
            const existing = issues.find(i => i.title === title);
            if (!existing) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                labels: ['canon'],
              body: `## Setup Checklist\n\n### 1. Service principal\n- [ ] Create an Entra ID app registration (or reuse an existing SP)\n- [ ] Enable "Service principals can use Fabric APIs" in Power BI Admin portal\n- [ ] Add the SP as a Member on the Fabric workspace\n\n### 2. GitHub Actions secrets and variables\n- [ ] Secret: \`CANON_FABRIC_CLIENT_SECRET\` — SP client secret\n- [ ] Secret: \`CANON_FABRIC_TENANT_ID\` — Azure AD tenant GUID\n- [ ] Secret: \`CANON_FABRIC_CLIENT_ID\` — SP application GUID\n- [ ] Variable: \`CANON_FABRIC_WORKSPACE_ID\` — workspace GUID from the Power BI URL\n- [ ] Variable: \`CANON_FABRIC_DATASET_NAME\` — exact semantic model name\n- [ ] Secret (optional): \`CANON_SQL_SERVER\` / \`CANON_SQL_DATABASE\` — Fabric SQL endpoint\n- [ ] Secret (optional): \`ANTHROPIC_API_KEY\` — enables LLM-enriched bootstrap definitions\n\n### 3. Configuration\n- [ ] Update \`scan-config.yaml\`: connector \`workspace_id\`, \`dataset_name\`, SQL \`server\`/\`database\`\n- [ ] Update \`scan-config.yaml\`: \`domains[].owners\` with GitHub @handles of domain owners\n- [ ] Update \`CODEOWNERS\`: uncomment and set the \`/domains/<slug>/\` line with the same handles\n\n### 4. First domain\n- [ ] Run \`canon bootstrap --domain <slug>\` (or trigger \`bootstrap.yml\` from Actions)\n- [ ] Review and merge the draft PR\n- [ ] Enable the scheduled scan workflow (\`scan.yml\` cron)\n\n_Optional:_ run eval harness via \`workflow_dispatch\` on \`eval.yml\` to benchmark answer quality.\n`,
              });
            }
