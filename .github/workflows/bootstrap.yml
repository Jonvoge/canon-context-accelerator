name: Canon Bootstrap
on:
  workflow_dispatch:
    inputs:
      domain:
        description: 'Domain slug to bootstrap (e.g. retail)'
        required: true
        type: string
      dry_run:
        description: 'Dry run — draft definitions but do not create PR'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - name: Set up Python
        run: uv python install 3.12
      - name: Install dependencies
        run: uv sync --frozen
      - name: Run bootstrap
        env:
          CANON_FABRIC_CLIENT_SECRET: ${{ secrets.CANON_FABRIC_CLIENT_SECRET }}
          CANON_FABRIC_TENANT_ID: ${{ secrets.CANON_FABRIC_TENANT_ID }}
          CANON_FABRIC_CLIENT_ID: ${{ secrets.CANON_FABRIC_CLIENT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DOMAIN="${{ inputs.domain }}"
          FLAGS=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            FLAGS="--dry-run"
          fi
          echo "Bootstrapping domain: $DOMAIN"
          uv run canon bootstrap --domain "$DOMAIN" --config scan-config.yaml $FLAGS
      - name: Upload bootstrap report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bootstrap-report-${{ inputs.domain }}
          path: .canon-cache/${{ inputs.domain }}/bootstrap-report.json
          retention-days: 30
